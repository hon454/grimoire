name: Change request
description: Propose a Grimoire documentation, packaging, or workflow change.
title: "<type>(<scope>): <summary>"
body:
  - type: markdown
    attributes:
      value: |
        Use a Conventional Commit-style title, such as `docs(readme): clarify installation steps`.

        Keep examples clearly marked as examples. Do not present possible future skills or plugins as promised roadmap items.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap, drift, bug, or ambiguity should this change address?
      placeholder: |
        A documented setup step is ambiguous, which can lead users or agents to install the plugin incorrectly.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should be true after this issue is completed?
      placeholder: |
        The relevant documentation should describe the intended workflow clearly enough for a new user to follow it without extra context.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List the concrete work that is in scope.
      placeholder: |
        - Update the affected documentation.
        - Keep English and Korean docs consistent when both are affected.
        - Preserve existing repository compatibility rules.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Use checkboxes for observable completion criteria.
      placeholder: |
        - [ ] The changed documentation states the expected behavior clearly.
        - [ ] Companion docs are updated when repository instructions require it.
        - [ ] Validation commands or manual checks are recorded in the pull request or final summary.
    validations:
      required: true

  - type: textarea
    id: affected-areas
    attributes:
      label: Affected areas
      description: Identify files, directories, manifests, skills, or docs likely to change.
      placeholder: |
        - `README.md`
        - `README.ko.md`
        - `.codex-plugin/plugin.json`
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: Clarify what this issue must not do, especially when examples could be mistaken for roadmap commitments.
      placeholder: |
        - Do not change unrelated skills or manifests.
        - Do not add placeholder content for future work.
        - Do not broaden the repository scope beyond this issue.
    validations:
      required: false
