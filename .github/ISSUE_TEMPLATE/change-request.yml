name: Change request
description: Propose a Grimoire documentation, packaging, or workflow change.
title: "<type>(<scope>): <summary>"
body:
  - type: markdown
    attributes:
      value: |
        Use a Conventional Commit-style title, such as `docs(plugins): define the Book of plugin convention`.

        Keep examples clearly marked as examples. Do not present possible future skills or plugins as promised roadmap items.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap, drift, bug, or ambiguity should this change address?
      placeholder: |
        After introducing `archmage`, Grimoire needs a clear convention for future domain plugins.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should be true after this issue is completed?
      placeholder: |
        The repository should document `book-of-*` as the convention for domain-specific Grimoire plugins, distinct from `archmage`.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List the concrete work that is in scope.
      placeholder: |
        - Document the plugin taxonomy.
        - Define naming conventions.
        - Add a short checklist.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Use checkboxes for observable completion criteria.
      placeholder: |
        - [ ] README explains the convention.
        - [ ] README.ko.md mirrors the same convention in Korean.
        - [ ] No placeholder directories are created.
    validations:
      required: true

  - type: textarea
    id: affected-areas
    attributes:
      label: Affected areas
      description: Identify files, directories, manifests, skills, or docs likely to change.
      placeholder: |
        - `README.md`
        - `README.ko.md`
        - `AGENTS.md`
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: Clarify what this issue must not do, especially when examples could be mistaken for roadmap commitments.
      placeholder: |
        - Do not create example plugins yet.
        - Do not move or invent domain skills.
        - Do not add roadmap lists of future plugins.
    validations:
      required: false
